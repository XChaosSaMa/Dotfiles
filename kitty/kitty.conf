# --- Tipografía ---
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Ventana y Estilo ---
window_padding_width 12
remember_window_size  no
initial_window_width  950
initial_window_height 550

# --- Transparencia y Desenfocado ---
background_opacity 0.85
# Nota: background_blur requiere que tu compositor (Hyprland, Sway, etc.) lo soporte.
background_blur 1

# --- Barra de Pestañas (Por si abres varias) ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_font_style   bold

# --- Colores (Estilo Catppuccin / Oscuro Moderno) ---
background            #1e1e2e
foreground            #cdd6f4
selection_background  #585b70
selection_foreground  #cdd6f4
url_color             #f5e0dc
cursor                #f5e0dc

# Colores de la terminal (Normales / Brillantes)
# Negros
color0 #45475a
color8 #585b70
# Rojos
color1 #f38ba8
color9 #f38ba8
# Verdes
color2 #a6e3a1
color10 #a6e3a1
# Amarillos
color3 #f9e2af
color11 #f9e2af
# Azules
color4 #89b4fa
color12 #89b4fa
# Magentas
color5 #f5c2e7
color13 #f5c2e7
# Cyans
color6 #94e2d5
color14 #94e2d5
# Blancos
color7 #bac2de
color15 #a6adc8

# --- Avanzado ---
enable_audio_bell no
detect_urls yes
