# Configuración General
font=JetBrainsMono Nerd Font:size=12
dpi-aware=yes
fields=name,generic,comment,exec
terminal=foot # O tu terminal favorita
prompt="❯ "
icon-theme=Papirus-Dark

[colors]
# Formato: RRGGBBAA (Rojo, Verde, Azul, Alfa/Transparencia)
background=1e1e2edd        # Fondo oscuro con un toque de transparencia
text=cdd6f4ff              # Texto principal claro
match=f38ba8ff             # Color de las letras que coinciden al escribir
selection=585b70ff         # Fondo de la fila seleccionada
selection-text=cdd6f4ff    # Texto de la fila seleccionada
selection-match=f38ba8ff   # Coincidencias en la fila seleccionada
border=b4befe55            # Borde sutil

[border]
width=2
radius=10                  # Esquinas redondeadas (¡clave para que se vea moderno!)

[dmenu]
mode=text

[key-bindings]
# Aquí puedes añadir atajos si lo deseas
